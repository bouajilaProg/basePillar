services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: basepillar-postgres
    env_file:
      - .env.staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API Backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    container_name: basepillar-api
    env_file:
      - .env.staging
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FRONTEND_URL: ${FRONTEND_URL}
      CENTRALIZED_CONSOLE_URL: ${CENTRALIZED_CONSOLE_URL}
      S3_ENDPOINT: http://garage:3900
      S3_REGION: garage
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    ports:
      - '${API_PORT:-3005}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      console:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/docs-json').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vite Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      network: host
    container_name: basepillar-frontend
    env_file:
      - .env.staging
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
      docs:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # Docusaurus Docs
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      network: host
    container_name: basepillar-docs
    env_file:
      - .env.staging
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # Centralized Logs Console
  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
      network: host
    container_name: basepillar-console
    env_file:
      - .env.staging
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      PORT: 4000
      NODE_ENV: production
    ports:
      - '${CONSOLE_PORT:-4005}:4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Garage S3-compatible Storage
  garage:
    image: dxflrs/garage:v1.0.0
    container_name: basepillar-garage
    env_file:
      - .env.staging
    volumes:
      - ./infrastructure/garage/garage.toml:/etc/garage.toml
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
    ports:
      - '${GARAGE_S3_PORT:-3910}:3900'
      - '${GARAGE_ADMIN_PORT:-3912}:3902'
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml

volumes:
  postgres_data:
  garage_data:
  garage_meta:
